<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculatrice">
        <div class="texte">Calculatrice</div>
        <!-- disabled c'est pour ne pas permettre la modification de l'écran -->
        <input class="ecran" type="text" disabled value="44000" id="ecran">
        <div class="btn">
            <button onclick="effacer()" class="gray">AC</button>
            <button onclick="ajouter('%')" class="gray">%</button>
            <button onclick="ajouter('÷')" class="gray">÷</button>
            <button onclick="ajouter('X')" class="orange">X</button>
            <button onclick="ajouter('7')" class="chiffre">7</button>
            <button onclick="ajouter('8')" class="chiffre">8</button>
            <button onclick="ajouter('9')" class="chiffre">9</button>
            <button onclick="ajouter('-')" class="orange">-</button>
            <button onclick="ajouter('4')" class="chiffre">4</button>
            <button onclick="ajouter('5')" class="chiffre">5</button>
            <button onclick="ajouter('6')" class="chiffre">6</button>
            <button onclick="ajouter('+')" class="orange">+</button>
            <button onclick="ajouter('1')" class="chiffre">1</button>
            <button onclick="ajouter('2')" class="chiffre">2</button>
            <button onclick="ajouter('3')" class="chiffre">3</button>
            <button onclick="calculer()" class="orange" id="egal">=</button>
            <button onclick="ajouter('0')" class="chiffre" id="zero">0</button>
            <button onclick="ajouter('.')" class="chiffre">.</button>


        </div>
    </div>
    <script>
        function ajouter(valeur) {
            document.getElementById("ecran").value += valeur;
        }

        function effacer() {
            document.getElementById("ecran").value = "";
        }

        function calculer() {
            let ecran = document.getElementById("ecran");
            try {
                ecran.value = eval(ecran.value);
            } catch {
                ecran.value = "Erreur";
            }
        }
        function eval(expression) {
            // Remplace les opérateurs personnalisés par les opérateurs JavaScript
            expression = expression.replace(/÷/g, '/').replace(/X/g, '*');
            return Function('"use strict";return (' + expression + ')')();
        }
        function ajouter(valeur) {
            const ecran = document.getElementById("ecran");
            if (ecran.value === "0" || ecran.value === "Erreur") {
                ecran.value = valeur;
            } else {
                ecran.value += valeur;
            }
        }
        function effacer() {
            document.getElementById("ecran").value = "0";
        }
        function calculer() {
            const ecran = document.getElementById("ecran");
            try {
                ecran.value = eval(ecran.value);
            } catch {
                ecran.value = "Erreur";
            }
        }
        function eval(expression) {
            expression = expression.replace(/÷/g, '/').replace(/X/g, '*');
            return Function('"use strict";return (' + expression + ')')();
        }
        function ajouter(valeur) {
            const ecran = document.getElementById("ecran");
            if (ecran.value === "0" || ecran.value === "Erreur") {
                ecran.value = valeur;
            } else {
                ecran.value += valeur;
            }
        }
        function effacer() {
            document.getElementById("ecran").value = "0";
        }
        function calculer() {
            const ecran = document.getElementById("ecran");
            try {
                ecran.value = eval(ecran.value);
            } catch {
                ecran.value = "Erreur";
            }   
        }
    </script>


</body>

</html>
